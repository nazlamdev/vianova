<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Vianova – Presidio</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 3rem;
      color: #1a1a1a;
    }

    header {
      width: 100%;
      max-width: 440px;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      font-size: 0.875rem;
      color: #6b7280;
      margin-top: 0.25rem;
    }

    .card {
      background: #ffffff;
      border-radius: 14px;
      padding: 1.75rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.05);
      margin-bottom: 1.25rem;
    }

    /* ---- chiamata ---- */
    .btn-call {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 1rem 1.25rem;
      background: #1d4ed8;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      line-height: 1.3;
      text-align: center;
      transition: background 0.18s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-call:hover { background: #1e40af; }
    .btn-call:active { background: #1e3a8a; transform: scale(0.98); }

    .btn-call svg {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
    }

    /* ---- form ---- */
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1.4rem;
      color: #111827;
    }

    .form-group { margin-bottom: 1.1rem; }

    label.field-label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 0.35rem;
    }

    .required-star { color: #dc2626; margin-left: 2px; }

    input[type="text"] {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.9375rem;
      color: #1a1a1a;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input[type="text"]:focus {
      border-color: #1d4ed8;
      background: #fff;
    }

    textarea {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.9375rem;
      color: #1a1a1a;
      background: #fafafa;
      outline: none;
      resize: vertical;
      min-height: 88px;
      font-family: inherit;
      transition: border-color 0.2s, background 0.2s;
    }

    textarea:focus {
      border-color: #1d4ed8;
      background: #fff;
    }

    /* radio toggle */
    .toggle-group {
      display: flex;
      gap: 0.5rem;
    }

    .toggle-group input[type="radio"] { display: none; }

    .toggle-group label {
      flex: 1;
      text-align: center;
      padding: 0.55rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      color: #374151;
      background: #fafafa;
      transition: all 0.15s;
      user-select: none;
    }

    .toggle-group input[type="radio"]:checked + label {
      border-color: #1d4ed8;
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: 600;
    }

    /* esito OK/KO colors */
    #esito-ok:checked + label {
      border-color: #059669 !important;
      background: #ecfdf5 !important;
      color: #059669 !important;
    }

    #esito-ko:checked + label {
      border-color: #dc2626 !important;
      background: #fef2f2 !important;
      color: #dc2626 !important;
    }

    /* hidden */
    .hidden { display: none !important; }

    /* note transition */
    #note-group {
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s;
      max-height: 200px;
      opacity: 1;
    }

    #note-group.hidden {
      max-height: 0;
      opacity: 0;
    }

    /* submit */
    .btn-submit {
      width: 100%;
      padding: 0.9rem;
      background: #059669;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.18s, transform 0.1s;
    }

    .btn-submit:hover { background: #047857; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }

    /* feedback */
    .feedback {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
    }

    .feedback.success {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .feedback.error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    /* spinner */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid #ffffff44;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 0.4rem;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <h1>Vianova</h1>
    <p>Supporto Operativo Presidio</p>
  </header>

  <!-- Scheda chiamata -->
  <div class="card">
    <a class="btn-call" href="tel:05844244526">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.86a16 16 0 0 0 6.29 6.29l.94-.94a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
      Chiamata Presidio Vianova
      <br><small style="font-size:.8rem;font-weight:400;opacity:.85">05844244526</small>
    </a>
  </div>

  <!-- Scheda form esito -->
  <div class="card">
    <p class="card-title">Registra Esito Intervento</p>

    <form id="esitoForm" novalidate>

      <div class="form-group">
        <label class="field-label" for="codiceSede">
          Codice Sede<span class="required-star">*</span>
        </label>
        <input type="text" id="codiceSede" name="codiceSede"
               placeholder="Es. VN001" autocomplete="off" required>
      </div>

      <div class="form-group">
        <label class="field-label">Esito<span class="required-star">*</span></label>
        <div class="toggle-group">
          <input type="radio" id="esito-ok" name="esito" value="OK">
          <label for="esito-ok">OK</label>

          <input type="radio" id="esito-ko" name="esito" value="KO">
          <label for="esito-ko">KO</label>
        </div>
      </div>

      <div class="form-group hidden" id="note-group">
        <label class="field-label" for="note">
          Note<span class="required-star">*</span>
        </label>
        <textarea id="note" name="note" placeholder="Descrivi il problema riscontrato..."></textarea>
      </div>

      <div class="form-group">
        <label class="field-label">
          Chiamata Vianova<span class="required-star">*</span>
        </label>
        <div class="toggle-group">
          <input type="radio" id="chiamata-si" name="chiamataVianova" value="SI">
          <label for="chiamata-si">Sì</label>

          <input type="radio" id="chiamata-no" name="chiamataVianova" value="NO">
          <label for="chiamata-no">No</label>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Invia Esito</button>

      <div id="feedback" class="feedback hidden"></div>

    </form>
  </div>

  <script>
    // ---- config ----
    var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxYUHNA8H32ncFjCSQgD4LaZnGvVC3XeBvtmqzv9xkNvNjFmwT6dgWCUL_X0gluX0uZ/exec';

    // ---- refs ----
    var form       = document.getElementById('esitoForm');
    var noteGroup  = document.getElementById('note-group');
    var noteField  = document.getElementById('note');
    var submitBtn  = document.getElementById('submitBtn');
    var feedback   = document.getElementById('feedback');

    // ---- mostra/nascondi note in base all'esito ----
    document.querySelectorAll('input[name="esito"]').forEach(function(r) {
      r.addEventListener('change', function() {
        var isKO = document.querySelector('input[name="esito"]:checked')?.value === 'KO';
        if (isKO) {
          noteGroup.classList.remove('hidden');
          noteField.required = true;
        } else {
          noteGroup.classList.add('hidden');
          noteField.required = false;
          noteField.value = '';
        }
      });
    });

    // ---- validazione manuale ----
    function validate() {
      var sede     = document.getElementById('codiceSede').value.trim();
      var esito    = document.querySelector('input[name="esito"]:checked');
      var chiamata = document.querySelector('input[name="chiamataVianova"]:checked');
      var note     = noteField.value.trim();

      if (!sede)     { showFeedback('error', 'Inserisci il Codice Sede.'); return false; }
      if (!esito)    { showFeedback('error', 'Seleziona un Esito (OK / KO).'); return false; }
      if (esito.value === 'KO' && !note) {
        showFeedback('error', 'Le Note sono obbligatorie per esito KO.');
        return false;
      }
      if (!chiamata) { showFeedback('error', 'Indica se è stata effettuata la Chiamata Vianova.'); return false; }
      return true;
    }

    // ---- submit ----
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      hideFeedback();
      if (!validate()) return;

      setLoading(true);

      var data = new URLSearchParams({
        codiceSede:      document.getElementById('codiceSede').value.trim(),
        esito:           document.querySelector('input[name="esito"]:checked').value,
        note:            noteField.value.trim(),
        chiamataVianova: document.querySelector('input[name="chiamataVianova"]:checked').value
      });

      fetch(APPS_SCRIPT_URL, {
        method:  'POST',
        mode:    'no-cors',          // Apps Script CORS constraint
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body:    data.toString()
      })
      .then(function() {
        showFeedback('success', '✓ Esito inviato correttamente. Email inviata ai destinatari.');
        form.reset();
        noteGroup.classList.add('hidden');
        noteField.required = false;
      })
      .catch(function() {
        showFeedback('error', 'Errore di rete. Controlla la connessione e riprova.');
      })
      .finally(function() {
        setLoading(false);
      });
    });

    // ---- helpers ----
    function setLoading(on) {
      submitBtn.disabled = on;
      submitBtn.innerHTML = on
        ? '<span class="spinner"></span> Invio in corso…'
        : 'Invia Esito';
    }

    function showFeedback(type, msg) {
      feedback.className = 'feedback ' + type;
      feedback.textContent = msg;
    }

    function hideFeedback() {
      feedback.className = 'feedback hidden';
      feedback.textContent = '';
    }
  </script>

</body>
</html>
